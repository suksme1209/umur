<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CEK UMUR BY PAK KAJI</title>

<style>

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
}

.header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:2px;
}

.container{
display:flex;
justify-content:center;
margin-top:50px;
}

.card{
background:#1e293b;
padding:35px;
border-radius:12px;
width:440px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

label{
display:block;
margin-top:18px;
font-size:14px;
}

input,select{
width:100%;
height:42px;
padding:0 12px;
margin-top:6px;
border-radius:8px;
border:none;
font-size:14px;
background:#e5e7eb;
color:#111827;
}

button{
width:100%;
height:44px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:25px;
border-radius:8px;
border:none;
font-size:15px;
}

button:hover{
background:#16a34a;
}

.result{
margin-top:25px;
background:#020617;
padding:18px;
border-radius:8px;
font-size:16px;
text-align:center;
}

.statusMS{
color:#22c55e;
font-weight:bold;
}

.statusTMS{
color:#ef4444;
font-weight:bold;
}

.warning{
color:#facc15;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
CEK UMUR BY PAK KAJI
</div>

<div class="container">
<div class="card">

<label>JALUR</label>

<select id="jalur" onchange="updatePendidikan()">
<option value="">PILIH JALUR</option>
<option value="AKPOL">AKPOL</option>
<option value="BINTARA">BINTARA</option>
<option value="TAMTAMA">TAMTAMA</option>
</select>

<label>PENDIDIKAN TERAKHIR</label>

<select id="pendidikan">
<option value="">PILIH PENDIDIKAN</option>
</select>

<label>TANGGAL LAHIR</label>

<input type="date" id="lahir">

<button onclick="hitung()">CEK UMUR</button>

<div class="result" id="hasil"></div>

</div>
</div>

<script>

/* FORMAT TANGGAL */

function formatTanggal(t){

let d=new Date(t)

let hari=String(d.getDate()).padStart(2,'0')
let bulan=String(d.getMonth()+1).padStart(2,'0')
let tahun=d.getFullYear()

return hari+"/"+bulan+"/"+tahun

}


/* UPDATE PENDIDIKAN */

function updatePendidikan(){

let jalur=document.getElementById("jalur").value
let pendidikan=document.getElementById("pendidikan")

pendidikan.innerHTML="<option value=''>PILIH PENDIDIKAN</option>"

let data={

AKPOL:["SMA","MA"],

BINTARA:[
"SMA","SMK","MA","MAK","PDF",
"PONDOK PESANTREN","SPM",
"D-I","D-II","D-III","D4","S1"
],

TAMTAMA:[
"SMA","SMK","MA","MAK",
"PDF","PONDOK PESANTREN","SPM"
]

}

if(data[jalur]){

data[jalur].forEach(function(p){

let opt=document.createElement("option")
opt.value=p
opt.text=p

pendidikan.appendChild(opt)

})

}

}


/* HITUNG UMUR */

function hitung(){

let jalur=document.getElementById("jalur").value
let pendidikan=document.getElementById("pendidikan").value
let lahirInput=document.getElementById("lahir").value

if(jalur=="" || pendidikan=="" || lahirInput==""){

document.getElementById("hasil").innerHTML=
"<span class='warning'>LENGKAPI DATA !</span>"

return

}

let lahir=new Date(lahirInput)
let lahirFormat=formatTanggal(lahirInput)


/* TANGGAL BUKA DIK */

let bukaDik

if(jalur=="AKPOL"){
bukaDik=new Date("2026-08-01")
}else{
bukaDik=new Date("2026-07-20")
}


/* HITUNG UMUR */

let tahun=bukaDik.getFullYear()-lahir.getFullYear()
let bulan=bukaDik.getMonth()-lahir.getMonth()
let hari=bukaDik.getDate()-lahir.getDate()

if(hari<0){
bulan--
let lastMonth=new Date(bukaDik.getFullYear(),bukaDik.getMonth(),0)
hari+=lastMonth.getDate()
}

if(bulan<0){
tahun--
bulan+=12
}


/* BATAS LAHIR */

let minLahir
let maxLahir


if(jalur=="AKPOL"){

minLahir=new Date("2005-08-01")
maxLahir=new Date("2010-08-01")

}

if(jalur=="TAMTAMA"){

maxLahir=new Date("2004-07-20")
minLahir=new Date("2008-12-20")

}

if(jalur=="BINTARA"){

minLahir=new Date("2008-12-20")

if(["D-I","D-II","D-III"].includes(pendidikan)){

maxLahir=new Date("2002-07-20")

}
else if(["D4","S1"].includes(pendidikan)){

maxLahir=new Date("1999-07-20")

}
else{

maxLahir=new Date("2004-07-20")

}

}


/* STATUS */

let status

if(lahir>=maxLahir && lahir<=minLahir){

status="<span class='statusMS'>MEMENUHI SYARAT (MS)</span>"

}else{

status="<span class='statusTMS'>TIDAK MEMENUHI SYARAT (TMS)</span>"

}


/* OUTPUT */

document.getElementById("hasil").innerHTML=

"TANGGAL LAHIR : "+lahirFormat+"<br><br>"+
"UMUR : "+tahun+" TAHUN "+bulan+" BULAN "+hari+" HARI<br><br>"+
"STATUS : "+status

}

</script>

</body>
</html>
